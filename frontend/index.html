<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Demo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Kubernetes Demo Application</h1>

        <div class="card">

            <h2>Backend Information</h2>

            <p><strong>Message:</strong> <span id="message"></span></p>

            <p><strong>Pod Name:</strong> <span id="podName"></span></p>

            <p><strong>Pod IP:</strong> <span id="podIp"></span></p>

        </div>

        <div class="card">

            <h2>Enter Your Name</h2>

            <input
                type="text"
                id="username"
                placeholder="Enter your name">

            <button onclick="saveUser()">
                Save
            </button>

        </div>

        <div class="card">

            <h2>Users Stored in PostgreSQL</h2>

            <ul id="users"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
