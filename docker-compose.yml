version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres

    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:

    build:
      context: ./backend

    container_name: backend

    ports:
      - "5000:5000"

    environment:
      DB_HOST: postgres
      DB_NAME: demo
      DB_USER: postgres
      DB_PASSWORD: password

    depends_on:
      - postgres

  frontend:

    build:
      context: ./frontend

    container_name: frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

volumes:
  postgres-data:
